<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra Papel o Tijera</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <main class="app">
    <header class="scoreboard">
        <div class="brand">
            <span>PIEDRA</span>
            <span>PAPEL</span>
            <span>TIJERA</span>
        </div>

        <div class="score-box">
            <p>PUNTAJE</p>
            <strong id="score">0</strong>
        </div>
    </header>

    <section class="game game--picking active" id="pickView">
        <div class="triangle"></div>

        <button class="pick pick--paper" data-choice="paper" aria-label="Elegir papel">
            <span class="pick__inner">✋</span>
        </button>

        <button class="pick pick--scissors" data-choice="scissors" aria-label="Elegir tijera">
            <span class="pick__inner">✌</span>
        </button>

        <button class="pick pick--rock" data-choice="rock" aria-label="Elegir piedra">
            <span class="pick__inner">✊</span>
        </button>
    </section>

    <section class="result" id="resultView" hidden>
        <article class="result__slot">
        <h2>TÚ ESCOGISTE</h2>
        <div id="playerPick"></div>
    </article>

    <article class="result__status">
        <h3 id="resultText"></h3>
        <button id="playAgain">JUGAR DE NUEVO</button>
    </article>

    <article class="result__slot">
        <h2>LA CPU ESCOGIÓ</h2>
        <div class="house-placeholder" id="housePick"></div>
    </article>
    </section>

    <button class="rules-btn" id="openRules">REGLAS</button>
</main>

    <div class="modal" id="rulesModal" hidden>
        <div class="modal__overlay"></div>

    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="rulesTitle">
        <div class="modal__head">
            <h2 id="rulesTitle">REGLAS</h2>
        <button class="modal__close" id="closeRules" aria-label="Cerrar reglas">×</button>
    </div>

    <div class="rules-diagram rules-diagram--3">
        <div class="rule-item paper">✋</div>
        <div class="rule-item scissors">✌</div>
        <div class="rule-item rock">✊</div>

        <span class="arrow a1">VENCE</span>
        <span class="arrow a2">VENCE</span>
        <span class="arrow a3">VENCE</span>
    </div>
    </div>
</div>

<div class="toast-modal" id="toastModal" hidden>
    <div class="toast-modal__box" id="toastBox">
        <h2 id="toastTitle">Resultado</h2>
        <p id="toastMessage">Aquí aparecerá el resultado</p>
        <button id="toastClose">Cerrar</button>
    </div>
</div>

    <script src="./script.js"></script>
</body>
</html>
